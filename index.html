<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS SAA Puzzle | PERFECT SAA EDITION</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #E50000; 
            --bg: #111111;      
            --card: #FFFFFF;    
            --text: #000000; 
            --success: #28a745; 
            --gold: #FFCC00; 
            --slot-bg: #f5f5f5;
            --grad-color: rgba(229, 0, 0, 0.25); 
        }

        body.theme-p3 {
            --primary: #00A8FF; 
            --bg: #001233;      
            --card: #FFFFFF;    
            --text: #000000; 
            --success: #28a745; 
            --gold: #FFCC00; 
            --slot-bg: #e0f0ff;
            --grad-color: rgba(0, 168, 255, 0.25);
        }

        body.theme-p4 {
            --primary: #F3C623; 
            --bg: #111111;      
            --card: #FFFFFF;    
            --text: #000000; 
            --success: #28a745; 
            --gold: #D31212; 
            --slot-bg: #fffbe6;
            --grad-color: rgba(243, 198, 35, 0.25);
        }

        body { 
            font-family: 'Arial Black', 'Helvetica Neue', 'Hiragino Sans', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(var(--grad-color) 15%, transparent 15%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            margin: 0; display: flex; justify-content: center; color: white;
            user-select: none; -webkit-user-select: none; padding: 20px 0; padding-bottom: 80px; overflow-x: hidden;
            transition: background-color 0.3s;
        }

        .container { width: 100%; max-width: 650px; padding: 0 20px; position: relative; }
        .app-header { display: flex; justify-content: space-between; align-items: center; height: 50px; margin-bottom: 10px; position: relative; }
        
        .back-btn { position: absolute; left: 0; z-index: 10; background: white; color: black; border: 4px solid black; padding: 8px 18px; font-weight: 900; transform: skew(-15deg); cursor: pointer; box-shadow: 4px 4px 0 var(--primary); transition: 0.1s; text-transform: uppercase; letter-spacing: 1px; touch-action: manipulation; }
        
        .settings-btn { width: 45px; height: 45px; background: white; border: 4px solid black; display: flex; align-items: center; justify-content: center; cursor: pointer; transform: rotate(5deg); box-shadow: 4px 4px 0 var(--primary); transition: 0.1s; touch-action: manipulation; }
        
        .settings-icon-bar, .settings-icon-bar::before, .settings-icon-bar::after { content: ""; width: 22px; height: 4px; background: black; position: absolute; }
        .settings-icon-bar::before { top: -8px; } .settings-icon-bar::after { top: 8px; }

        .card { background: var(--card); color: var(--text); padding: 20px; border: 5px solid black; box-shadow: 12px 12px 0px var(--primary); position: relative; transition: box-shadow 0.3s; }
        
        h1 { background: black; color: white; display: inline-block; padding: 8px 25px; transform: rotate(-3deg) translateX(-10px); font-size: 22px; margin-top: -10px; margin-bottom: 20px; box-shadow: 5px 5px 0 var(--primary); letter-spacing: 2px; }
        
        #q-text { font-size: 15px; font-weight: 900; line-height: 1.6; border-left: 8px solid var(--primary); padding-left: 15px; margin-bottom: 15px; transition: border-color 0.3s; }

        .controls-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; background: #eee; border: 3px solid #ccc; font-weight: bold; color: var(--primary); font-size: 14px;}

        #canvas-area { position: relative; width: 100%; min-height: 400px; background: #fdfdfd; border: 4px dashed #333; margin-bottom: 20px; overflow: hidden; touch-action: pan-y; }
        
        /* ★ 修正：矢印レイヤーのz-indexを3にして、スロット(2)より前に来るように変更 ★ */
        #links-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }

        .aws-slot {
            position: absolute; width: 95px; height: 45px; border: 3px dashed #888; background: var(--slot-bg);
            border-radius: 4px; transform: translate(-50%, -50%); z-index: 2; display: flex; align-items: center; justify-content: center;
            color: #888; font-weight: bold; font-size: 12px; pointer-events: none; transition: background 0.3s;
        }

        .aws-node {
            position: absolute; width: 95px; height: 45px; background: white; border: 3px solid black; color: black;
            font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2); cursor: grab; transform: translate(-50%, -50%); touch-action: none; z-index: 10;
            line-height: 1.2; padding: 2px; box-sizing: border-box;
        }
        .aws-node:active { cursor: grabbing; box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

        .palette { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .palette-item { border: 3px solid black; font-weight: 900; cursor: grab; padding: 8px 12px; background: white; color: black; transform: skew(-5deg); box-shadow: 4px 4px 0 #ccc; touch-action: none; font-size: 11px; line-height: 1.2; text-align: center;}
        .palette-item:active { cursor: grabbing; box-shadow: none; transform: skew(-5deg) translate(3px,3px); }

        .drag-ghost { position: fixed; width: 95px; height: 45px; background: rgba(255,255,255,0.9); border: 3px solid black; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 8px 8px 0 rgba(211,18,18,0.5); transform: translate(-50%, -50%) scale(1.1); pointer-events: none; z-index: 9999; line-height: 1.2; padding: 2px; box-sizing: border-box;}

        .menu-btn { border: 4px solid black; font-weight: 900; cursor: pointer; transition: 0.1s; padding: 15px; background: white; color: black; transform: skew(-8deg); width: 100%; margin-bottom: 15px; font-size: 15px; text-align: left; letter-spacing: 1px; touch-action: manipulation;}
        .menu-btn.primary { background: var(--primary); color: white; box-shadow: 6px 6px 0 black; font-size: 18px; text-align: center; }
        .menu-btn.small { padding: 8px 15px; font-size: 13px; box-shadow: 3px 3px 0 black; width: auto; margin: 0;}

        .result { margin-top: 25px; padding: 20px; border: 5px solid black; font-weight: 900; }
        .correct { border-color: var(--success); color: var(--success); }
        .wrong { background: black; color: white; border-color: var(--primary); }
        .hidden { display: none !important; }

        .explanation-text { font-size: 14px; line-height: 1.6; margin-top: 15px; font-weight: bold; color: inherit; white-space: pre-wrap; text-align: left;}
        
        #correct-canvas { position: relative; width: 100%; min-height: 250px; background: #fdfdfd; border: 3px dashed #ccc; overflow: hidden; touch-action: pan-y; margin-top: 10px;}
        
        /* ★ 修正：ミニノードのz-indexを10に指定して、線(3)の上に確実に来るように変更 ★ */
        .aws-node-mini { position: absolute; width: 90px; height: 42px; background: white; border: 3px solid var(--success); color: black; font-weight: bold; font-size: 10px; text-align: center; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 2px 2px 0 #ccc; line-height: 1.2; padding: 2px; box-sizing: border-box; z-index: 10; }

        .timer-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 4px solid var(--primary); display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 -5px 15px rgba(211,18,18,0.2); transition: border-color 0.3s; }
        .timer-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--primary); width: 100%; opacity: 0.5; transition: background 0.3s; }

        #settings-modal, #glossary-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 500; }
        .modal-content { background: black; padding: 30px; border: 5px solid white; width: 85%; max-width: 320px; text-align: center; color: white; transform: rotate(-2deg); box-shadow: 10px 10px 0 black; }
        
        #glossary-modal .modal-content { max-height: 80vh; overflow-y: auto; text-align: left; padding: 20px; }
        #glossary-modal .modal-content::-webkit-scrollbar { width: 8px; }
        #glossary-modal .modal-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .volume-control { margin: 25px 0; text-align: left; } .volume-label { font-size: 14px; font-weight: 900; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        .slider { appearance: none; -webkit-appearance: none; width: 100%; height: 8px; background: #444; outline: none; border: 2px solid white; touch-action: manipulation; }
        .slider::-webkit-slider-thumb { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; background: white; cursor: pointer; border: 3px solid var(--primary); border-radius: 50%; transition: border-color 0.3s; }

        .correct-anime { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 25px solid var(--success); border-radius: 50%; pointer-events: none; z-index: 1000; opacity: 0; transition: border-color 0.3s;}
        .run-anime { animation: p5-circle 0.4s ease-out forwards; } @keyframes p5-circle { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; border: 6px solid var(--primary); transform: translateZ(0); } @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        #loading-screen { text-align: center; padding: 50px 0; font-weight: bold; font-size: 18px; color: var(--primary); }

        #theme-wipe {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: 9999; pointer-events: none; background-color: transparent; 
            box-shadow: 0 0 100px transparent; transform: rotate(-45deg) translateY(150%);
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9998; background-color: black; pointer-events: none;
            transition: opacity 1.5s ease-in-out; opacity: 0;
        }

        @keyframes secret-btn-glow {
            0%, 100% { box-shadow: 4px 4px 0 #FF0040, 0 0 10px #FF0040; }
            50% { box-shadow: 4px 4px 0 #800020, 0 0 20px #800020; }
        }

        /* 隠しモード用のスタイル */
        body.secret-mode {
            --primary: #FF0040; --bg: #050005; --card: #1a001a; --text: #eeeeee; --success: #00ff40; --gold: #ff00ff; --slot-bg: #100010; --grad-color: rgba(255, 0, 64, 0.3);
        }
        body.secret-mode::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(45deg, #1a001a 25%, transparent 25%), linear-gradient(-45deg, #1a001a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a001a 75%), linear-gradient(-45deg, transparent 75%, #1a001a 75%);
            background-size: 100px 100px; background-position: 0 0, 0 50px, 50px 50px, 50px 0; opacity: 0.1; animation: secret-bg-move 10s linear infinite; z-index: -1;
        }
        body.secret-mode .back-btn { background: #000; color: #eee; border-color: #FF0040; box-shadow: 4px 4px 0 #FF0040; }
        body.secret-mode .settings-btn { background: #000; border-color: #FF0040; box-shadow: 4px 4px 0 #FF0040; }
        body.secret-mode .settings-icon-bar, body.secret-mode .settings-icon-bar::before, body.secret-mode .settings-icon-bar::after { background: #eee; }
        body.secret-mode h1 { background: #FF0040; color: white; border: 3px solid black; box-shadow: 5px 5px 0 #000; }
        body.secret-mode .controls-area { background: #100010; border-color: #555; color: #eee; }
        body.secret-mode #canvas-area { background: #000; border-color: #FF0040; }
        body.secret-mode .aws-slot { border-color: #555; color: #555; }
        body.secret-mode .aws-node { background: #000; color: #eee; border-color: #FF0040; box-shadow: 4px 4px 0 #FF0040; }
        body.secret-mode .palette-item { background: #000; color: #eee; border-color: #FF0040; box-shadow: 4px 4px 0 #000; }
        body.secret-mode .drag-ghost { background: rgba(26, 0, 26, 0.9); border-color: #FF0040; color: #eee; box-shadow: 8px 8px 0 rgba(255, 0, 64, 0.5); }
        body.secret-mode .menu-btn { background: #000; color: #eee; border-color: #FF0040; box-shadow: 4px 4px 0 #FF0040; }
        body.secret-mode .menu-btn.primary { background: #FF0040; color: white; box-shadow: 6px 6px 0 #000; }
        body.secret-mode .result.correct { border-color: #00ff40; color: #00ff40; }
        body.secret-mode .result.wrong { background: #000; color: #eee; border-color: #FF0040; }
        body.secret-mode #correct-canvas { background: #000; border-color: #FF0040; }
        body.secret-mode .aws-node-mini { background: #000; color: #eee; border-color: #00ff40; box-shadow: 2px 2px 0 #000; }
        body.secret-mode .timer-container { border-color: #FF0040; box-shadow: 0 -5px 15px rgba(255, 0, 64, 0.5); }
        body.secret-mode .timer-bar { background: #FF0040; }
        body.secret-mode #settings-modal, body.secret-mode #glossary-modal { background: rgba(0,0,0,0.9); }
        body.secret-mode .modal-content { border-color: #FF0040; background: #1a001a; box-shadow: 10px 10px 0 #000; }
        body.secret-mode .slider { border-color: #FF0040; background: #000; }
        body.secret-mode .slider::-webkit-slider-thumb { background: #FF0040; border-color: white; }
        body.secret-mode .correct-anime { border-color: #00ff40; }

        @media (hover: hover) and (pointer: fine) {
            .back-btn:hover { background: var(--primary); color: white; transform: skew(-15deg) translate(-3px, -3px); box-shadow: 6px 6px 0 black; }
            body.secret-mode .back-btn:hover { background: #FF0040; color: white; box-shadow: 6px 6px 0 #000; }
            .settings-btn:hover { transform: rotate(5deg) translate(-3px, -3px); box-shadow: 6px 6px 0 black; }
            body.secret-mode .settings-btn:hover { box-shadow: 6px 6px 0 #000; }
            .menu-btn:hover { background: var(--primary); color: white; transform: translate(-4px, -4px) skew(-8deg); box-shadow: 8px 8px 0 black; }
            body.secret-mode .menu-btn:hover { background: #FF0040; color: white; box-shadow: 8px 8px 0 #000; }
        }

        @media (max-width: 480px) {
            .controls-area { flex-direction: column; align-items: stretch; padding: 10px; }
            .controls-area span { margin-bottom: 10px; text-align: center; font-size: 12px; }
            .controls-area > div { justify-content: center; gap: 10px; }
            .controls-area > div > button { flex: 1; }
            
            .aws-slot, .aws-node, .drag-ghost { width: 105px !important; height: 50px !important; font-size: 11px !important; line-height: 1.3 !important; padding: 2px !important; white-space: normal !important; }
            .aws-node-mini { width: 95px !important; height: 48px !important; font-size: 10px !important; line-height: 1.3 !important; padding: 2px !important; white-space: normal !important; }
            
            .palette-item { padding: 8px 10px; font-size: 11px; }
            #q-text { font-size: 14px; }
            
            #result-btn-area { gap: 5px !important; }
            #result-btn-area .menu-btn { font-size: 13px !important; padding: 10px 4px !important; letter-spacing: 0 !important; white-space: nowrap; }
            #result-btn-area .menu-btn.primary { font-size: 13px !important; }
        }
    </style>
</head>
<body>

<div id="theme-wipe"></div>
<canvas id="matrix-canvas" class="hidden"></canvas>
<div id="circle-anime" class="correct-anime"></div>

<div id="settings-modal" onclick="closeSettings()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="font-size: 30px; margin-bottom: 20px; font-weight: 900;">MENU</h2>
        
        <button id="change-mode-btn" class="menu-btn hidden" style="background: black; color: #FF0040; border-color: #FF0040; text-align: center; margin-bottom: 20px; animation: secret-btn-glow 2s infinite, shake 0.3s infinite;" onclick="clickWrapper(activateSecretMode)">CHANGE MODE</button>

        <div class="volume-control"><span class="volume-label">BGM VOLUME</span><input type="range" min="0" max="1" step="0.01" value="0.08" class="slider" oninput="updateBgmVolume(this.value)"></div>
        <div class="volume-control"><span class="volume-label">SE VOLUME</span><input type="range" min="0" max="1" step="0.01" value="0.5" class="slider" oninput="updateSeVolume(this.value)"></div>
        
        <button class="menu-btn" style="background: var(--gold); color: black; margin-top: 15px; margin-bottom: 25px; text-align: center;" onclick="clickWrapper(openGlossary)">Service Details</button>

        <button class="menu-btn primary" onclick="clickWrapper(() => closeSettings())">RESUME</button>
    </div>
</div>

<div id="glossary-modal" onclick="closeGlossary()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="font-size: 20px; margin-bottom: 20px; font-weight: 900; text-align: center; color: var(--gold);">SERVICE GLOSSARY</h2>
        <div id="glossary-list"></div>
        <button class="menu-btn primary" style="margin-top:20px" onclick="clickWrapper(closeGlossary)">閉じる</button>
    </div>
</div>

<div class="container">
    <header class="app-header">
        <div style="display:flex; gap:10px; margin-right: auto; align-items: center; z-index: 10; position: relative;">
            <button id="theme-btn" class="settings-btn" style="font-size: 20px;" onclick="clickWrapper(cycleTheme)">★</button>
            <button id="reset-mode-btn" class="menu-btn small hidden" style="position: absolute; left: 0; background: black; color: white; border-color: white; margin: 0; padding: 6px 10px; white-space: nowrap;" onclick="clickWrapper(deactivateSecretMode)">RESET MODE</button>
        </div>
        
        <button id="back-btn" class="back-btn hidden" onclick="clickWrapper(backToMenu)">◀ BACK</button>
        
        <button class="settings-btn" style="margin-left: auto; z-index: 10;" onclick="clickWrapper(() => openSettings())"><div class="settings-icon-bar"></div></button>
    </header>

    <div id="main-menu-screen" class="card">
        <h1>AWS SAA Puzzle</h1>
        <div style="font-weight: bold; margin-bottom: 20px;">制限時間：各問 90秒</div>
        <div id="loading-screen">loading...</div>
        <div id="puzzle-list"></div>
    </div>

    <div id="quiz-screen" class="card hidden">
        <h1 id="puzzle-title">タイトル</h1>
        <div id="q-text">問題文</div>
        
        <div class="controls-area">
            <span>▶ スロットへドラッグ（ユーザー起点）</span>
            <div style="display: flex; gap: 8px;">
                <button id="hint-btn" class="menu-btn small" style="background: var(--gold); color: black;" onclick="clickWrapper(useHint)">ヒント</button>
                <button class="menu-btn small" onclick="clickWrapper(clearCanvasNodes)">クリア</button>
            </div>
        </div>

        <div id="canvas-area">
            <svg id="links-svg">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#888" /></marker>
                    <marker id="arrow-mini" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--success)" /></marker>
                </defs>
            </svg>
        </div>

        <div id="service-palette" class="palette"></div>
        <button id="submit-btn" class="menu-btn primary" onclick="submitPuzzle()">SUBMIT ARCHITECTURE</button>

        <div id="result-box" class="result hidden">
            <div id="ans-status" style="font-size:24px; text-align: center;"></div>
            <div id="ans-desc" class="explanation-text"></div>
            
            <div id="correct-answer-area" class="hidden" style="margin-top: 20px; text-align: left; background: #fff; padding: 10px; border: 4px solid var(--success);">
                <h3 style="margin-top: 0; margin-bottom: 10px; color: var(--success); font-size: 16px;">【正解の構成例】</h3>
                <div id="correct-canvas">
                    <svg id="correct-links-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3;"></svg>
                </div>
            </div>

            <div id="result-btn-area" style="display: flex; gap: 10px; margin-top: 25px;">
                <button id="retry-btn-result" class="menu-btn" style="background: white; color: black; margin-bottom: 0;" onclick="clickWrapper(retryPuzzle)">もう一度</button>
                <button id="next-btn" class="menu-btn primary hidden" style="margin-bottom: 0;" onclick="clickWrapper(nextPuzzle)">次の問題へ</button>
                <button id="menu-btn-result" class="menu-btn primary" style="margin-bottom: 0;" onclick="clickWrapper(backToMenu)">メニューへ</button>
            </div>
        </div>
    </div>
</div>

<div id="timer-ui" class="timer-container hidden">
    <div id="timer-bar" class="timer-bar"></div>
    <div style="position:relative; font-size:28px; font-weight:900;"><span id="timer-label">TIME:</span> <span id="timer-num">90.0</span></div>
</div>

<script>
    const themes = ['', 'theme-p3', 'theme-p4']; 
    const themeColors = ['#E50000', '#00A8FF', '#F3C623']; 
    let currentThemeIdx = 0;

    function cycleTheme() {
        if(isSecretMode) return; 
        
        currentThemeIdx = (currentThemeIdx + 1) % themes.length;
        const nextTheme = themes[currentThemeIdx];
        const nextColor = themeColors[currentThemeIdx];
        
        const wipe = document.getElementById('theme-wipe');
        wipe.style.setProperty('--wipe-color', nextColor);
        wipe.style.backgroundColor = 'var(--wipe-color)'; 
        wipe.style.boxShadow = '0 0 100px var(--wipe-color)';
        wipe.style.transition = 'transform 0.5s cubic-bezier(0.64, 0.04, 0.35, 1)';
        wipe.style.transform = 'rotate(-45deg) translateY(0%)'; 
        
        setTimeout(() => {
            document.body.className = nextTheme;
            wipe.style.transform = 'rotate(-45deg) translateY(-150%)'; 
            setTimeout(() => {
                wipe.style.transition = 'none';
                wipe.style.transform = 'rotate(-45deg) translateY(150%)';
                wipe.style.backgroundColor = 'transparent'; 
                wipe.style.boxShadow = '0 0 100px transparent';
            }, 500);
        }, 500);
    }

    const awsColors = {

    function startBGM(fadeIn = false) { 
        if (bgmVolume === 0) return; 
        const bgmName = isSecretMode ? 'secret_bgm' : 'bgm'; 
        
        if (bgmSource && currentBGMName === bgmName) return;

        if (!soundBuffers[bgmName]) return; 
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{}); 

        playNextLoop(bgmName, fadeIn);
    }

    function playNextLoop(bgmName, fadeIn) {
        if (!audioCtx || !soundBuffers[bgmName]) return;
        try {
            const source = audioCtx.createBufferSource(); 
            source.buffer = soundBuffers[bgmName]; 
            
            const gainNode = audioCtx.createGain(); 
            
            if (fadeIn) {
                const now = Math.max(audioCtx.currentTime, 0);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(bgmVolume, now + 3); 
            } else {
                gainNode.gain.value = bgmVolume; 
            }

            source.connect(gainNode).connect(audioCtx.destination); 
            source.start(0); 

            if (bgmSource && bgmGainNode) {
                const oldSource = bgmSource;
                const oldGain = bgmGainNode;
                try {
                    const now = Math.max(audioCtx.currentTime, 0);
                    oldGain.gain.cancelScheduledValues(now);
                    oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                    oldGain.gain.linearRampToValueAtTime(0, now + 3);
                } catch(e) {
                    oldGain.gain.value = 0; 
                }
                setTimeout(() => { try { oldSource.stop(); } catch(e){} }, 3000);
            }

            bgmSource = source;
            bgmGainNode = gainNode;
            currentBGMName = bgmName;

            const bufferDuration = source.buffer.duration;
            clearTimeout(loopTimeout);
            if (bufferDuration > 3) {
                loopTimeout = setTimeout(() => {
                    playNextLoop(bgmName, true);
                }, (bufferDuration - 3) * 1000);
            }
        } catch(e) {
            console.error("BGM Loop Error:", e);
        }
    }

    function stopBGM() { 
        clearTimeout(loopTimeout);
        if (bgmSource && bgmGainNode) { 
            const oldSource = bgmSource;
            const oldGain = bgmGainNode;
            try {
                const now = Math.max(audioCtx.currentTime, 0);
                oldGain.gain.cancelScheduledValues(now);
                oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                oldGain.gain.linearRampToValueAtTime(0, now + 1);
            } catch(e) {
                oldGain.gain.value = 0;
            }
            setTimeout(() => { try { oldSource.stop(); } catch(e){} }, 1000);
        } 
        bgmSource = null; 
        bgmGainNode = null; 
        currentBGMName = null;
    }

    // ★ 修正：同じ層のノードのy座標にジグザグの段差をつける ★
    function calculateNodePositions(nodes, links, canvasW, isMini = false) {
        let inDegree = {}; let adj = {};
        nodes.forEach(n => { inDegree[n] = 0; adj[n] = []; });
        links.forEach(l => { if(adj[l.from]) adj[l.from].push(l.to); if(inDegree[l.to] !== undefined) inDegree[l.to]++; });
        
        let queue = []; let layerMap = {};
        nodes.forEach(n => { if(inDegree[n] === 0) { queue.push(n); layerMap[n] = 0; } });
        while(queue.length > 0) {
            let u = queue.shift();
            adj[u].forEach(v => {
                layerMap[v] = Math.max(layerMap[v] || 0, layerMap[u] + 1);
                inDegree[v]--; if(inDegree[v] === 0) queue.push(v);
            });
        }
        nodes.forEach(n => { if(layerMap[n] === undefined) layerMap[n] = 0; });
        
        let maxLayer = 0; let layerCounts = {};
        let maxNodesInLayer = 0;
        nodes.forEach(n => {
            let l = layerMap[n]; maxLayer = Math.max(maxLayer, l);
            if(!layerCounts[l]) layerCounts[l] = []; layerCounts[l].push(n);
            if(layerCounts[l].length > maxNodesInLayer) maxNodesInLayer = layerCounts[l].length;
        });
        
        const isMobile = window.innerWidth <= 480;
        const requiredHeightPerLayer = isMini ? (isMobile ? 120 : 120) : (isMobile ? 100 : 120);
        const requiredCanvasH = Math.max(isMini ? 250 : 350, (maxLayer + 2) * requiredHeightPerLayer);
        const spacingY = requiredCanvasH / (maxLayer + 2);
        
        let positions = {};
        // ★ ジグザグ用のオフセット（ピクセル単位）
        const zigzagOffset = isMini ? 18 : 22; 

        for(let l = 0; l <= maxLayer; l++) {
            if(!layerCounts[l]) continue;
            let nList = layerCounts[l];
            let spacingX = canvasW / (nList.length + 1); 
            
            nList.forEach((type, idx) => { 
                let baseY = spacingY * (l + 1);
                // ★ 複数のノードが同じ層に並ぶ場合、偶数番目と奇数番目でy座標を上下にずらして文字被りを防ぐ
                if (nList.length > 1) {
                    if (idx % 2 === 0) {
                        baseY -= zigzagOffset;
                    } else {
                        baseY += zigzagOffset;
                    }
                }
                positions[type] = { x: spacingX * (idx + 1), y: baseY }; 
            });
        }
        return { positions, requiredCanvasH };
    }

    function drawLinkLine(svg, s1, s2, color, isDashed, labelText, isMini = false) {
        let dx = s2.x - s1.x; let dy = s2.y - s1.y; let angle = Math.atan2(dy, dx);
        
        let nodeW = 95;
        let nodeH = 45;
        if (isMini) {
            nodeW = 90;
            nodeH = 42;
        }
        let w = nodeW / 2; let h = nodeH / 2; 

        let absCos = Math.abs(Math.cos(angle)); let absSin = Math.abs(Math.sin(angle));
        let dist1 = (absCos * h > absSin * w) ? (w / absCos) : (h / absSin);
        
        let fromX = s1.x + dist1 * Math.cos(angle); let fromY = s1.y + dist1 * Math.sin(angle);
        let dist2 = dist1 + 8; 
        let toX = s2.x - dist2 * Math.cos(angle); let toY = s2.y - dist2 * Math.sin(angle);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fromX); line.setAttribute('y1', fromY);
        line.setAttribute('x2', toX); line.setAttribute('y2', toY);
        line.setAttribute('stroke', color); line.setAttribute('stroke-width', '4');
        if (color === '#888') line.setAttribute('marker-end', 'url(#arrow)'); else line.setAttribute('marker-end', 'url(#arrow-mini)');
        if (isDashed) line.setAttribute('stroke-dasharray', '4');
        svg.appendChild(line);

        if (labelText) {
            let normalAngle = angle - Math.PI / 2;
            if (dx < 0) normalAngle += Math.PI;

            let offsetAmount = isMini ? 16 : 16;
            let offsetX = Math.cos(normalAngle) * offsetAmount;
            let offsetY = Math.sin(normalAngle) * offsetAmount;

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', ((fromX + toX) / 2) + offsetX);
            text.setAttribute('y', ((fromY + toY) / 2) + offsetY + 4); 
            text.setAttribute('fill', color);
            const isMobile = window.innerWidth <= 480;
            text.setAttribute('font-size', isMini ? '10' : '11');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('font-weight', 'bold');
            text.setAttribute('paint-order', 'stroke');
            text.setAttribute('stroke', isSecretMode ? '#000' : '#fdfdfd'); 
            text.setAttribute('stroke-width', '5'); // ★ 白フチを付けて文字を見やすく ★
            text.textContent = labelText;
            svg.appendChild(text);
        }
    }

    function setupCanvas() {
        const canvas = document.getElementById('canvas-area');
        canvas.querySelectorAll('.aws-slot, .aws-node').forEach(e => e.remove());
        
        const canvasW = canvas.clientWidth || 300;
        const layout = calculateNodePositions(currentPuzzle.correctNodes, currentPuzzle.correctLinks, canvasW, false);
        
        canvas.style.height = `${layout.requiredCanvasH}px`;
        
        slotData = currentPuzzle.correctNodes.map((type, i) => {
            let p = layout.positions[type]; return { id: `slot-${i}`, x: p.x, y: p.y, expectedType: type, placedType: null };
        });

        slotData.forEach(slot => {
            const el = document.createElement('div'); el.className = 'aws-slot'; el.id = slot.id; el.style.left = `${slot.x}px`; el.style.top = `${slot.y}px`; el.innerText = "?";
            canvas.appendChild(el);
        });

        const svg = document.getElementById('links-svg');
        svg.innerHTML = `<defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#888" /></marker>
        </defs>`;
        
        currentPuzzle.correctLinks.forEach(link => {
            const s1 = slotData.find(s => s.expectedType === link.from);
            const s2 = slotData.find(s => s.expectedType === link.to);
            if (s1 && s2) drawLinkLine(svg, s1, s2, '#888', true, link.label, false);
        });
    }

    function renderPalette() {
        const palette = document.getElementById('service-palette'); palette.innerHTML = '';
        currentPuzzle.palette.forEach(service => {
            const btn = document.createElement('div'); btn.className = 'palette-item'; 
            btn.innerText = getDisplayName(service);
            btn.style.borderBottom = `5px solid ${getAwsColor(service)}`;
            btn.addEventListener('pointerdown', (e) => startDrag(e, 'palette', service, null));
            palette.appendChild(btn);
        });
    }

    function clearCanvasNodes() { 
        slotData.forEach(s => s.placedType = null); 
        document.querySelectorAll('.aws-node').forEach(e => e.remove()); 
        updateHintButtonState(); 
    }

    function startDrag(e, source, type, sourceSlotId) {
        if(e.button !== 0 && e.type.includes('mouse')) return; 
        dragData = { source, type, sourceSlotId, startX: e.clientX, startY: e.clientY, currentX: e.clientX, currentY: e.clientY, ghostEl: null, isDragging: false };
        e.currentTarget.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
        if (!dragData) return;
        dragData.currentX = e.clientX; dragData.currentY = e.clientY;
        if (!dragData.isDragging && Math.hypot(dragData.currentX - dragData.startX, dragData.currentY - dragData.startY) > 5) {
            dragData.isDragging = true;
            const ghost = document.createElement('div'); ghost.className = 'drag-ghost'; ghost.innerText = getDisplayName(dragData.type);
            ghost.style.borderBottom = `5px solid ${getAwsColor(dragData.type)}`;
            document.body.appendChild(ghost); dragData.ghostEl = ghost;
            if (dragData.source === 'slot') {
                const nodeEl = document.getElementById(`node-${dragData.sourceSlotId}`); if(nodeEl) nodeEl.remove();
                const slot = slotData.find(s => s.id === dragData.sourceSlotId); if(slot) slot.placedType = null;
                updateHintButtonState(); 
            }
        }
        if (dragData.isDragging && dragData.ghostEl) { dragData.ghostEl.style.left = `${dragData.currentX}px`; dragData.ghostEl.style.top = `${dragData.currentY}px`; }
    }

    function onPointerUp(e) {
        if (!dragData) return;
        if (dragData.ghostEl) dragData.ghostEl.remove();
        if (dragData.isDragging) {
            let targetSlotId = null; const canvasRect = document.getElementById('canvas-area').getBoundingClientRect();
            if (e.clientX >= canvasRect.left && e.clientX <= canvasRect.right && e.clientY >= canvasRect.top && e.clientY <= canvasRect.bottom) {
                const canvasX = e.clientX - canvasRect.left; 
                const canvasY = e.clientY - canvasRect.top;
                for (let slot of slotData) { if (Math.hypot(slot.x - canvasX, slot.y - canvasY) < 40) { targetSlotId = slot.id; break; } }
            }
            if (targetSlotId) { placeNodeInSlot(targetSlotId, dragData.type); playSE('select'); } 
        }
        dragData = null;
    }

    function placeNodeInSlot(slotId, serviceType) {
        const slot = slotData.find(s => s.id === slotId); if(!slot) return;
        if (slot.placedType) { const oldNode = document.getElementById(`node-${slotId}`); if(oldNode) oldNode.remove(); }
        slot.placedType = serviceType;
        const canvas = document.getElementById('canvas-area'); const nodeEl = document.createElement('div');
        nodeEl.className = 'aws-node'; nodeEl.id = `node-${slotId}`; nodeEl.innerText = getDisplayName(serviceType);
        nodeEl.style.left = `${slot.x}px`; nodeEl.style.top = `${slot.y}px`; nodeEl.style.borderBottom = `5px solid ${getAwsColor(serviceType)}`;
        nodeEl.addEventListener('pointerdown', (e) => startDrag(e, 'slot', serviceType, slotId));
        canvas.appendChild(nodeEl);
        updateHintButtonState(); 
    }

    function submitPuzzle(isTimeUp = false) {
        stopTimer(); document.getElementById('submit-btn').disabled = true; dragData = null;
        
        let userNodes = slotData.map(s => s.placedType).filter(Boolean);
        let isCorrect = false;

        if (currentPuzzle && currentPuzzle.title.includes('Shield AdvancedのSRT連携')) {
            if (userNodes.length === 0) {
                emptySubmitCount++;
            } else {
                emptySubmitCount = 0; 
            }
        }

        if (userNodes.length === currentPuzzle.correctNodes.length) {
            const isNodesCorrect = checkArraysMatch(currentPuzzle.correctNodes, userNodes);
            
            let userLinks = [];
            currentPuzzle.correctLinks.forEach(link => {
                const fromSlot = slotData.find(s => s.expectedType === link.from);
                const toSlot = slotData.find(s => s.expectedType === link.to);
                if (fromSlot && toSlot && fromSlot.placedType && toSlot.placedType) {
                    userLinks.push({ from: fromSlot.placedType, to: toSlot.placedType });
                }
            });
            const isLinksCorrect = checkLinksMatch(currentPuzzle.correctLinks, userLinks);
            
            isCorrect = isNodesCorrect && isLinksCorrect;
        }

        playSE(isCorrect ? 'correct' : 'wrong');

        setTimeout(() => {
            if (isCorrect) { const circle = document.getElementById('circle-anime'); circle.classList.add('run-anime'); setTimeout(() => circle.classList.remove('run-anime'), 500); } 
            else { document.getElementById('quiz-screen').classList.add('shake'); setTimeout(() => document.getElementById('quiz-screen').classList.remove('shake'), 500); }

            const rb = document.getElementById('result-box'); rb.classList.remove('hidden'); rb.className = `result ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('ans-status').innerText = isCorrect ? "SUCCESS!!" : (isTimeUp ? "TIME UP..." : "FAILED..."); 
            
            const correctArea = document.getElementById('correct-answer-area');
            if (!isCorrect) {
                correctArea.classList.remove('hidden'); drawCorrectArchitecture();
                document.getElementById('ans-desc').innerText = "【下の正解プレビューを確認してください】\n\n" + currentPuzzle.explanation;
                document.getElementById('canvas-area').style.pointerEvents = 'none';
            } else {
                correctArea.classList.add('hidden'); document.getElementById('ans-desc').innerText = currentPuzzle.explanation;
            }

            let idx = puzzles.indexOf(currentPuzzle);
            if (idx + 1 < puzzles.length) { document.getElementById('next-btn').classList.remove('hidden'); document.getElementById('menu-btn-result').classList.add('hidden'); } 
            else { document.getElementById('next-btn').classList.add('hidden'); document.getElementById('menu-btn-result').classList.remove('hidden'); }
        }, 10);
    }

    function checkArraysMatch(arr1, arr2) { 
        if (arr1.length !== arr2.length) return false; 
        return [...arr1].sort().every((val, i) => val === [...arr2].sort()[i]); 
    }

    function checkLinksMatch(reqLinks, userLinks) { 
        if (reqLinks.length !== userLinks.length) return false; 
        let uLinks = [...userLinks];
        return reqLinks.every(req => {
            const idx = uLinks.findIndex(user => user.from === req.from && user.to === req.to);
            if (idx > -1) { uLinks.splice(idx, 1); return true; }
            return false;
        });
    }

    function drawCorrectArchitecture() {
        const canvas = document.getElementById('correct-canvas'); const svg = document.getElementById('correct-links-svg');
        canvas.querySelectorAll('.aws-node-mini').forEach(n => n.remove());
        svg.innerHTML = `<defs><marker id="arrow-mini" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--success)" /></marker></defs>`;

        let canvasW = canvas.clientWidth;
        if (canvasW === 0) canvasW = document.getElementById('canvas-area').clientWidth;

        const layout = calculateNodePositions(currentPuzzle.correctNodes, currentPuzzle.correctLinks, canvasW, true);
        canvas.style.height = `${Math.max(250, layout.requiredCanvasH)}px`; 
        
        currentPuzzle.correctNodes.forEach(nodeType => {
            const p = layout.positions[nodeType];
            const el = document.createElement('div'); el.className = 'aws-node-mini'; el.innerText = getDisplayName(nodeType);
            el.style.left = `${p.x}px`; el.style.top = `${p.y}px`; el.style.borderBottom = `4px solid ${getAwsColor(nodeType)}`;
            canvas.appendChild(el);
        });

        currentPuzzle.correctLinks.forEach(link => {
            const p1 = layout.positions[link.from]; const p2 = layout.positions[link.to];
            if (p1 && p2) drawLinkLine(svg, p1, p2, 'var(--success)', false, link.label, true);
        });
    }
</script>
